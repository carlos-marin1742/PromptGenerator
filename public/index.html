<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PromptGen</title>
<style>
  :root {
    --bg0: #11111b; --bg1: #181825; --bg2: #1e1e2e; --bg3: #252535;
    --border: #313244; --text: #cdd6f4; --text-dim: #6c7086; --text-sub: #9399b2;
    --feature: #a6e3a1; --bug: #f38ba8; --rework: #89b4fa; --fix: #fab387; --security: #f9e2af; --backend: #94e2d5; --frontend: #cba6f7;
    --accent: #cba6f7; --mode-color: var(--feature);
    --radius: 8px; --radius-sm: 5px;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--bg0); color: var(--text); }

  /* ── Layout ── */
  .app { display: flex; height: 100vh; overflow: hidden; }

  aside {
    width: 210px; flex-shrink: 0;
    background: var(--bg1); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow-x: hidden; overflow-y: auto;
  }

  .workspace {
    flex: 1; display: flex; overflow: hidden;
  }

  .form-panel {
    width: 42%; border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
    background: var(--bg0);
  }

  .output-panel {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
    background: var(--bg0);
  }

  /* ── Titlebar ── */
  .titlebar {
    height: 38px; background: var(--bg1); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 14px; gap: 9px; flex-shrink: 0;
  }
  .titlebar .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--mode-color); transition: background .3s; }
  .app-name { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--text-sub); }
  .mode-pill {
    margin-left: auto; font-size: 10px; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; color: var(--mode-color); background: color-mix(in srgb, var(--mode-color) 12%, transparent);
    border: 1px solid color-mix(in srgb, var(--mode-color) 35%, transparent);
    padding: 2px 9px; border-radius: 100px; transition: all .3s;
  }

  /* ── Sidebar ── */
  .sidebar-section { padding: 12px 10px; border-bottom: 1px solid var(--border); }
  .section-title { font-size: 9px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }

  .mode-list { display: flex; flex-direction: column; gap: 4px; }
  .mode-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; border-radius: var(--radius-sm);
    border: 1px solid transparent; background: transparent;
    color: var(--text-sub); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all .15s; text-align: left; width: 100%;
  }
  .mode-btn .m-icon { font-size: 14px; flex-shrink: 0; }
  .mode-btn .m-sub { font-size: 9px; color: var(--text-dim); font-weight: 400; display: block; margin-top: 1px; }
  .mode-btn:hover { background: var(--bg2); color: var(--text); }
  .mode-btn.active[data-mode="feature"] { background: #1a2e1e; color: var(--feature); border-color: color-mix(in srgb,var(--feature) 40%,transparent); }
  .mode-btn.active[data-mode="bug"]     { background: #2e1a1e; color: var(--bug);     border-color: color-mix(in srgb,var(--bug) 40%,transparent); }
  .mode-btn.active[data-mode="rework"]  { background: #1a1f2e; color: var(--rework);  border-color: color-mix(in srgb,var(--rework) 40%,transparent); }
  .mode-btn.active[data-mode="fix"]     { background: #2e221a; color: var(--fix);     border-color: color-mix(in srgb,var(--fix) 40%,transparent); }
  .mode-btn.active[data-mode="security"] { background: #2b281a; color: var(--security); border-color: color-mix(in srgb,var(--security) 40%,transparent); }
  .mode-btn.active[data-mode="backend"]  { background: #182b29; color: var(--backend);  border-color: color-mix(in srgb,var(--backend) 40%,transparent); }
  .mode-btn.active[data-mode="oversized"] { background: #182b29; color: var(--backend); border-color: color-mix(in srgb,var(--backend) 40%,transparent); }
  .mode-btn.active[data-mode="frontend"] { background: #281d31; color: var(--frontend); border-color: color-mix(in srgb,var(--frontend) 40%,transparent); }
  .mode-btn.active[data-mode^="agent_"],
  .mode-btn.active[data-mode^="watcher_"] { background: #281d31; color: var(--accent); border-color: color-mix(in srgb,var(--accent) 40%,transparent); }

  /* ── Context shortcuts ── */
  /* ── Panel headers ── */
  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg1);
  }
  .panel-title { font-size: 9px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--text-dim); }
  .panel-actions { display: flex; gap: 5px; align-items: center; }
  .format-select {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text-sub); font-size: 10px; font-weight: 700; padding: 4px 24px 4px 8px;
    cursor: pointer; text-transform: uppercase; letter-spacing: .04em;
  }
  .format-select:focus { outline: none; border-color: var(--mode-color); color: var(--text); }

  /* ── Form fields ── */
  .form-scroll { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field-label {
    font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
    color: var(--text-sub); display: flex; align-items: center; gap: 6px;
  }
  .field-label .opt { font-size: 9px; color: var(--text-dim); font-weight: 400; text-transform: none; letter-spacing: 0; }
  .field-label .req { color: var(--mode-color); font-size: 12px; line-height: 1; }
  .field-label .required-badge { color: #11111b; background: var(--mode-color); border-radius: 3px; padding: 1px 5px; font-size: 8px; letter-spacing: .08em; }
  .field.required-field .field-textarea { border-color: color-mix(in srgb, var(--mode-color) 75%, var(--border)); box-shadow: 0 0 0 1px color-mix(in srgb, var(--mode-color) 18%, transparent); }

  .field-input, .field-textarea {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); font-size: 12.5px; padding: 8px 10px; width: 100%;
    font-family: inherit; line-height: 1.55; transition: border-color .15s;
    resize: vertical;
  }
  .field-input { resize: none; height: 36px; }
  .field-textarea { min-height: 72px; }
  .field-textarea.list-field { min-height: 60px; font-family: monospace; font-size: 12px; }
  .field-input:focus, .field-textarea:focus { outline: none; border-color: var(--mode-color); }
  .field-input::placeholder, .field-textarea::placeholder { color: var(--text-dim); }

  .field-hint { font-size: 10px; color: var(--text-dim); }

  .progress-bar {
    height: 2px; background: var(--border); border-radius: 1px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--mode-color); border-radius: 1px;
    transition: width .3s, background .3s;
  }

  /* ── Output ── */
  .prompt-output {
    flex: 1; padding: 14px; overflow-y: auto;
    font-size: 12px; line-height: 1.75; font-family: 'Consolas', 'Cascadia Code', monospace;
    color: var(--text); white-space: pre-wrap; word-break: break-word;
  }
  .prompt-output.empty {
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); font-style: italic; font-family: inherit; font-size: 13px; white-space: normal; text-align: center;
  }
  .md-h1 { color: var(--mode-color); font-weight: bold; font-size: 13px; }
  .md-h2 { color: var(--text); font-weight: bold; }
  .md-h3 { color: var(--text-sub); font-weight: bold; }
  .md-dim { color: var(--text-dim); }
  .md-rule { color: var(--border); }
  .md-bracket { color: color-mix(in srgb, var(--mode-color) 60%, var(--text-dim)); font-style: italic; }

  /* ── Buttons ── */
  .btn { padding: 4px 11px; border-radius: var(--radius-sm); border: 1px solid var(--border); font-size: 10px; font-weight: 700; cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; letter-spacing: .04em; text-transform: uppercase; }
  .btn-ghost { background: transparent; color: var(--text-sub); }
  .btn-ghost:hover { background: var(--bg2); color: var(--text); }
  .btn-copy { background: transparent; color: var(--text-sub); border-color: var(--border); }
  .btn-copy:hover { color: var(--text); }
  .btn-copy.copied { color: var(--feature); border-color: var(--feature); }
  .btn-copy:disabled { cursor: not-allowed; opacity: .45; color: var(--text-dim); }

  /* ── Statusbar ── */
  .statusbar { height: 22px; background: var(--bg1); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 12px; gap: 10px; flex-shrink: 0; }
  .statusbar span { font-size: 10px; color: var(--text-dim); }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-dim); }
  .status-dot.ok { background: var(--feature); }

  /* ── Modal ── */
  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="app">

  <!-- ── Sidebar ── -->
  <aside>
    <div class="titlebar" style="border-right:none">
      <div class="dot" id="modeDot"></div>
      <span class="app-name">PromptGen</span>
    </div>

    <!-- Modes -->
    <div class="sidebar-section">
      <div class="section-title">Mode</div>
      <div class="mode-list">
        <button class="mode-btn active" data-mode="feature">
          <span class="m-icon">⚡</span>
          <span><span style="display:block">Feature</span><span class="m-sub">Add new functionality</span></span>
        </button>
        <button class="mode-btn" data-mode="bug">
          <span class="m-icon">🐛</span>
          <span><span style="display:block">Bug Fix</span><span class="m-sub">Investigate & fix</span></span>
        </button>
        <button class="mode-btn" data-mode="rework">
          <span class="m-icon">♻️</span>
          <span><span style="display:block">Rework</span><span class="m-sub">Refactor existing</span></span>
        </button>
        <button class="mode-btn" data-mode="fix">
          <span class="m-icon">🔧</span>
          <span><span style="display:block">Regression</span><span class="m-sub">Fix broken behavior</span></span>
        </button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-title">Security</div>
      <div class="mode-list">
        <button class="mode-btn" data-mode="security">
          <span class="m-icon">&#128737;</span>
          <span><span style="display:block">Security Audit</span><span class="m-sub">Audit &amp; harden app</span></span>
        </button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-title">Backend</div>
      <div class="mode-list">
        <button class="mode-btn" data-mode="backend">
          <span class="m-icon">&#9881;</span>
          <span><span style="display:block">Backend Refactor</span><span class="m-sub">Modularize &amp; simplify</span></span>
        </button>
        <button class="mode-btn" data-mode="oversized">
          <span class="m-icon">&#128196;</span>
          <span><span style="display:block">Oversized File</span><span class="m-sub">Split a target file</span></span>
        </button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-title">Frontend</div>
      <div class="mode-list">
        <button class="mode-btn" data-mode="frontend">
          <span class="m-icon">&#9638;</span>
          <span><span style="display:block">Frontend Refactor</span><span class="m-sub">Modularize UI code</span></span>
        </button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-title">Specialist Agents</div>
      <div class="mode-list">
        <button class="mode-btn" data-mode="agent_architect"><span class="m-icon">&#9635;</span><span><span style="display:block">Architect</span><span class="m-sub">Analyze &amp; plan</span></span></button>
        <button class="mode-btn" data-mode="agent_feature"><span class="m-icon">&#9889;</span><span><span style="display:block">Implementation</span><span class="m-sub">Build a feature</span></span></button>
        <button class="mode-btn" data-mode="agent_bug"><span class="m-icon">&#128269;</span><span><span style="display:block">Investigation</span><span class="m-sub">Find root cause</span></span></button>
        <button class="mode-btn" data-mode="agent_refactor"><span class="m-icon">&#9851;</span><span><span style="display:block">Refactor</span><span class="m-sub">Improve structure</span></span></button>
        <button class="mode-btn" data-mode="agent_security"><span class="m-icon">&#128737;</span><span><span style="display:block">Security</span><span class="m-sub">Find vulnerabilities</span></span></button>
        <button class="mode-btn" data-mode="agent_qa"><span class="m-icon">&#10003;</span><span><span style="display:block">Test &amp; QA</span><span class="m-sub">Verify behavior</span></span></button>
        <button class="mode-btn" data-mode="agent_api"><span class="m-icon">&#8644;</span><span><span style="display:block">API &amp; Database</span><span class="m-sub">Review data boundaries</span></span></button>
        <button class="mode-btn" data-mode="agent_review"><span class="m-icon">&#128065;</span><span><span style="display:block">Code Review</span><span class="m-sub">Review current diff</span></span></button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-title">Testing</div>
      <div class="mode-list">
        <button class="mode-btn" data-mode="agent_unit_tests"><span class="m-icon">&#10010;</span><span><span style="display:block">Generate Unit Tests</span><span class="m-sub">Test existing code</span></span></button>
        <button class="mode-btn" data-mode="agent_feature_tests"><span class="m-icon">&#10024;</span><span><span style="display:block">Test New Feature</span><span class="m-sub">Protect new behavior</span></span></button>
        <button class="mode-btn" data-mode="agent_coverage"><span class="m-icon">&#9638;</span><span><span style="display:block">Coverage Audit</span><span class="m-sub">Improve unit tests</span></span></button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-title">Background Agents</div>
      <div class="mode-list">
        <button class="mode-btn" data-mode="watcher_security"><span class="m-icon">&#128737;</span><span><span style="display:block">Security Watcher</span><span class="m-sub">Monitor security risks</span></span></button>
        <button class="mode-btn" data-mode="watcher_regression"><span class="m-icon">&#8634;</span><span><span style="display:block">Regression Watcher</span><span class="m-sub">Detect broken behavior</span></span></button>
        <button class="mode-btn" data-mode="watcher_quality"><span class="m-icon">&#9670;</span><span><span style="display:block">Quality Watcher</span><span class="m-sub">Watch technical debt</span></span></button>
        <button class="mode-btn" data-mode="watcher_architecture"><span class="m-icon">&#9635;</span><span><span style="display:block">Architecture Watcher</span><span class="m-sub">Detect pattern drift</span></span></button>
        <button class="mode-btn" data-mode="watcher_dependencies"><span class="m-icon">&#9881;</span><span><span style="display:block">Dependency Watcher</span><span class="m-sub">Audit config changes</span></span></button>
      </div>
    </div>

  </aside>

  <!-- ── Workspace ── -->
  <div class="workspace">

    <!-- Form panel -->
    <div class="form-panel">
      <div class="panel-header">
        <span class="panel-title" id="formTitle">New Feature</span>
        <button class="btn btn-ghost" id="clearBtn">Clear all</button>
      </div>
      <div class="form-scroll" id="formScroll"></div>
    </div>

    <!-- Output panel -->
    <div class="output-panel">
      <div class="panel-header">
        <span class="panel-title">Generated prompt</span>
        <div class="panel-actions">
          <select class="format-select" id="formatSelect" aria-label="Prompt format">
            <option value="generic">Generic</option>
            <option value="codex">Codex</option>
            <option value="claude">Claude Code</option>
          </select>
          <span id="charCount" style="font-size:10px;color:var(--text-dim)"></span>
          <button class="btn btn-copy" id="copyBtn">📋 Copy</button>
        </div>
      </div>
      <div class="prompt-output empty" id="promptOutput">
        Fill in the fields on the left →
      </div>
    </div>
  </div>
</div>

<!-- Statusbar -->
<div class="statusbar">
  <div class="status-dot ok" id="statusDot"></div>
  <span id="statusText">Ready</span>
</div>

<script src="agent-prompts.js"></script>
<script>
// ── Mode config ────────────────────────────────────────────────────
const MODE_COLORS = { feature:'#a6e3a1', bug:'#f38ba8', rework:'#89b4fa', fix:'#fab387', security:'#f9e2af', backend:'#94e2d5', oversized:'#94e2d5', frontend:'#cba6f7' }

const MODES = {
  feature: {
    label: 'New Feature', title: '# Add a New Feature',
    fields: [
      { id:'feature_request',   label:'Feature request',   placeholder:'Describe the feature you want to add.',                          type:'textarea', rows:3 },
      { id:'expected_behavior', label:'Expected behavior',  placeholder:'Describe what the user should be able to do and what should happen.', type:'textarea', rows:3 },
      { id:'requirements',      label:'Requirements',        placeholder:'One requirement per line:\nAuthenticated users only\nMobile responsive\nReal-time updates', type:'list' },
    ]
  },
  bug: {
    label: 'Bug Fix', title: '# Investigate and Fix a Bug',
    fields: [
      { id:'bug',               label:'Bug',               placeholder:'Describe the problem.',              type:'textarea', rows:3 },
      { id:'expected_behavior', label:'Expected behavior',  placeholder:'Describe what should happen.',       type:'textarea', rows:2 },
      { id:'actual_behavior',   label:'Actual behavior',    placeholder:'Describe what currently happens.',   type:'textarea', rows:2 },
      { id:'steps',             label:'Steps to reproduce', placeholder:'One step per line:\nLog in as admin\nNavigate to /settings\nClick Save', type:'list' },
      { id:'errors',            label:'Errors / logs',      placeholder:'Paste error messages, stack traces, console output…', type:'textarea', rows:3, optional:true },
    ]
  },
  rework: {
    label: 'Rework Feature', title: '# Rework an Existing Feature',
    fields: [
      { id:'feature_to_rework', label:'Feature to rework',                         placeholder:'Describe the current feature.',                                     type:'textarea', rows:3 },
      { id:'problems',          label:'Problems with the current implementation',   placeholder:'One problem per line:\nTightly coupled to the auth module\nNo error handling\nDuplicates logic from UserService', type:'list' },
      { id:'desired_behavior',  label:'Desired behavior',                           placeholder:'Describe how the feature should behave after the rework.',          type:'textarea', rows:3 },
      { id:'preserved',         label:'Existing behavior that must remain unchanged', placeholder:'One behavior per line:\nPublic API contract stays the same\nExisting tests must still pass', type:'list' },
    ]
  },
  fix: {
    label: 'Regression Fix', title: '# Fix a Regression Caused by a Recent Change',
    fields: [
      { id:'broken_behavior',  label:'Broken behavior',                  placeholder:'Describe what is no longer working.',                               type:'textarea', rows:2 },
      { id:'last_working',     label:'Last known working behavior',       placeholder:'Describe how it worked before.',                                    type:'textarea', rows:2 },
      { id:'recent_change',    label:'Recent change that may be related', placeholder:'Describe the recent feature, refactor, commit, merge, or dependency update.', type:'textarea', rows:2 },
      { id:'current_behavior', label:'Current behavior',                  placeholder:'Describe what happens now.',                                        type:'textarea', rows:2 },
      { id:'steps',            label:'Steps to reproduce',                placeholder:'One step per line:\nCheckout main\nRun npm start\nNavigate to /dashboard', type:'list' },
      { id:'errors',           label:'Errors / logs',                     placeholder:'Paste relevant errors, logs, or stack traces.',                     type:'textarea', rows:3, optional:true },
    ]
  },
  security: {
    label: 'Security Audit', title: '# Security Audit and Application Hardening',
    fields: [
      { id:'focus_areas', label:'Priority focus areas', placeholder:'One area per line:\nAuthentication and authorization\nFile uploads\nPublic API endpoints', type:'list', optional:true },
      { id:'known_concerns', label:'Known concerns', placeholder:'Describe any suspected vulnerabilities, recent incidents, or sensitive workflows.', type:'textarea', rows:3, optional:true },
      { id:'constraints', label:'Constraints', placeholder:'One constraint per line:\nPreserve existing API contracts\nDo not upgrade major dependencies', type:'list', optional:true },
    ]
  },
  backend: {
    label: 'Backend Refactor', title: '# Backend Refactor',
    fields: [
      { id:'target_areas', label:'Target areas', placeholder:'One area per line:\nAPI route handlers\nDatabase access layer\nAuthentication middleware', type:'list', optional:true },
      { id:'known_problems', label:'Known problems', placeholder:'Describe oversized files, duplicated logic, tight coupling, or inconsistent patterns.', type:'textarea', rows:3, optional:true },
      { id:'constraints', label:'Additional constraints', placeholder:'One constraint per line:\nPreserve all public API responses\nAvoid database migrations', type:'list', optional:true },
    ]
  },
  oversized: {
    label: 'Refactor Oversized File', title: '# Refactor an Oversized Backend File', requireComplete: true,
    fields: [
      { id:'target_file', label:'Target file', placeholder:'REQUIRED — enter a file path, e.g. src/routes/users.js', type:'textarea', rows:2, required:true },
      { id:'known_concerns', label:'Known concerns', placeholder:'Describe responsibilities or problem areas you already know about.', type:'textarea', rows:3, optional:true },
      { id:'constraints', label:'Additional constraints', placeholder:'One constraint per line:\nPreserve named exports\nKeep route registration unchanged', type:'list', optional:true },
    ]
  },
  frontend: {
    label: 'Frontend Refactor', title: '# Frontend Refactor',
    fields: [
      { id:'target_areas', label:'Target areas', placeholder:'One area per line:\nDashboard components\nForm state and validation\nAPI client usage', type:'list', optional:true },
      { id:'known_problems', label:'Known problems', placeholder:'Describe oversized components, duplicated UI, fragile effects, or state-management issues.', type:'textarea', rows:3, optional:true },
      { id:'constraints', label:'Additional constraints', placeholder:'One constraint per line:\nPreserve current visual design\nDo not change routes', type:'list', optional:true },
    ]
  }
}
Object.assign(MODES, window.AGENT_MODES)
Object.keys(window.AGENT_MODES).forEach(key => { MODE_COLORS[key] = '#cba6f7' })

// ── Fixed instruction blocks ───────────────────────────────────────
const INSTRUCTIONS = {
  feature: `## Instructions

Before modifying any files:

1. Inspect the repository structure.
2. Read the relevant configuration files, package files, documentation, and existing tests.
3. Trace the existing frontend, backend, API, authentication, and database patterns related to this feature.
4. Identify the files that need to be created or modified.
5. Check for existing utilities, components, hooks, services, routes, schemas, and models that can be reused.
6. Briefly explain your implementation plan.

Then implement the feature.

Follow these rules:

* Follow the repository's existing architecture and coding conventions.
* Do not place large amounts of new logic into an already oversized file.
* Create focused modules when appropriate.
* Do not duplicate existing utilities or business logic.
* Do not modify unrelated functionality.
* Preserve existing API contracts unless the requested feature requires a change.
* Add validation, error handling, authorization, loading states, and empty states where applicable.
* Do not expose secrets or sensitive information.

  security: `## Primary objective

Audit the application for security weaknesses across the frontend, backend, APIs, authentication, authorization, session handling, database access, file uploads, input validation, dependency usage, environment variables, secrets handling, error handling, logging, CORS, HTTP headers, rate limiting, injection risks, XSS, CSRF, SSRF, path traversal, insecure direct object references, privilege escalation, sensitive data exposure, unsafe deserialization, command execution, file-system access, dependency vulnerabilities, and production configuration.

Use OWASP-style security principles as a guide, but evaluate the actual architecture of this repository rather than applying generic fixes blindly.

## Phase 1: Understand the application

Before modifying files:

1. Inspect the repository structure.
2. Read the main configuration files.
3. Identify the frontend and backend frameworks.
4. Identify authentication and authorization mechanisms.
5. Identify database access patterns and ORM/query usage.
6. Identify API routes and privileged operations.
7. Identify file upload or file-processing functionality.
8. Identify environment variables and secret usage.
9. Review dependency manifests and lock files.
10. Review existing security middleware and protections.
11. Review current tests related to authentication, permissions, and validation.

Do not make changes yet.

## Phase 2: Perform a security audit

Inspect the codebase for vulnerabilities and insecure patterns.

Pay particular attention to:

### Authentication

Check for weak or plaintext password handling, incorrect hashing, missing brute-force protection, account enumeration, weak password reset flows, missing token expiration, insecure JWT configuration, insecure token storage, and authentication bypasses.

### Authorization

Check for missing role or ownership checks, IDOR vulnerabilities, horizontal or vertical privilege escalation, frontend-only authorization, and sensitive routes without server-side permission checks. Never assume hiding a button in the UI is sufficient authorization.

### Input validation

Review every externally controlled input source, including request bodies, query and route parameters, headers, cookies, form fields, file names, uploads, webhooks, and database-derived content that may contain user-controlled data. Look for SQL or NoSQL injection, command injection, XSS, path traversal, unsafe redirects, SSRF, prototype pollution, and unsafe parsing.

### Database security

Check for raw queries built with string concatenation, missing parameterization, overly broad database permissions, sensitive information unnecessarily returned to clients, missing ownership checks, and mass-assignment vulnerabilities.

### API security

Review authentication, authorization, data validation, rate limiting, request size limits, pagination limits, error responses, and sensitive fields returned from endpoints.

### CORS

Flag wildcard origins in production, credentials with overly broad origins, and unnecessary HTTP methods or headers.

### Cookies and sessions

When applicable, verify HttpOnly, Secure, SameSite, session expiration, session invalidation, and session fixation protection.

### Secrets and environment variables

Search for API keys, database credentials, private keys, tokens, and passwords. Do not print secret values in the output. If secrets appear committed, flag them clearly and recommend rotation. Do not automatically delete or rotate credentials.

### File uploads

If uploads are supported, inspect file type and size limits, MIME and extension validation, filename sanitization, path traversal, storage locations, public accessibility, executable uploads, and malware-related risk.

### HTTP security

Evaluate whether the architecture should use Content-Security-Policy, X-Content-Type-Options, Referrer-Policy, Strict-Transport-Security, frame protections, and Permissions-Policy. Only add headers appropriate for the application architecture.

### Dependencies

Inspect dependency manifests and lock files. Use available package-manager security tooling when possible, such as npm audit, pnpm audit, yarn audit, pip-audit, safety, composer audit, or cargo audit. Do not blindly upgrade major dependencies. Identify vulnerable dependencies first and evaluate whether upgrades could introduce breaking changes.

## Phase 3: Produce findings before changing code

Before implementing fixes, summarize the vulnerabilities found. Classify each as Critical, High, Medium, Low, or Informational.

For each finding include the vulnerability, severity, affected file or component, attack scenario, potential impact, and recommended remediation. Prioritize realistically exploitable vulnerabilities and avoid purely theoretical issues unless they have meaningful security implications.

## Phase 4: Harden the application

After identifying the findings, fix issues where remediation is reasonably safe and compatible with the existing architecture.

Prioritize authentication bypasses, authorization vulnerabilities, injection vulnerabilities, sensitive data exposure, secret leakage, file upload vulnerabilities, XSS, CSRF where applicable, SSRF, dangerous server-side execution, insecure session handling, unsafe CORS, missing validation, missing security headers, and rate limiting on sensitive endpoints.

Follow these rules:

* Do not rewrite unrelated functionality or change the architecture unnecessarily.
* Do not break existing API contracts unless required for security.
* Do not remove functionality simply because it creates security complexity.
* Use existing libraries and middleware where appropriate and avoid unnecessary dependencies.
* Do not implement custom cryptography.
* Do not expose secrets in logs or output.
* Do not disable security controls to make tests pass.
* Do not suppress errors without addressing the underlying issue.
* Preserve existing behavior wherever safely possible.

## Phase 5: Authorization review

For every route that reads private data, modifies or deletes data, manages users or roles, accesses administrative functionality, or accesses financial, medical, or otherwise sensitive records, confirm that authorization is enforced on the server. Check both role-based permissions and resource ownership. Explicitly look for cases where changing an ID could expose another user's data.

## Phase 6: Add security tests

Where practical, add regression tests for security-sensitive behavior. Verify that protected endpoints reject unauthenticated users, normal users cannot access admin endpoints, users cannot retrieve another user's private resources, invalid and malicious input is safely rejected, expired tokens are rejected, invalid or oversized uploads fail, and sensitive fields are not returned.

Do not write exploit code beyond what is necessary to safely validate the application's own defenses.

## Phase 7: Validate the changes

Run all relevant available tests, formatter, linter, type checker, build, dependency audit, and security-related tests. Fix issues caused by the changes.

Then review the final Git diff and confirm that no unrelated files changed, no secrets were added, no debugging code remains, existing functionality remains intact, and security controls are enforced server-side.

## Final report

Finish with:

### Executive summary

Briefly describe the application's security posture before and after the changes.

### Vulnerabilities found

For each issue include severity, vulnerability, affected component, risk, and fix applied.

### Files changed

List all modified or newly created files.

### Security improvements

Explain the protections added or strengthened.

### Validation

List the commands and tests run.

### Remaining risks

Identify vulnerabilities or architectural risks not automatically fixed and explain why they require manual review or a larger architectural change.

### Recommended next steps

Prioritize any remaining security work.

Important: Do not only produce a security report. Inspect the repository, make safe security improvements directly, run the available validation tools, and report exactly what changed.`,

  backend: `You are working directly inside an existing backend repository.

## Primary goal

   * Entry points
   * Routes
   * Controllers

   * Background jobs

   * Tests

5. Identify dependencies between modules.
6. Find oversized files, duplicated logic, mixed responsibilities, circular dependencies, and tightly coupled code.

Do not start moving code immediately.

## Phase 2: Create a refactor plan

Before editing files, provide a concise refactor plan.

Identify:

* Files that should remain unchanged.
* Files that should be split.
* New modules that should be created.
* Logic that should move into services or utilities.
* Database logic that should be separated from request handling.
* Validation that should be centralized.
* Middleware that should be extracted.
* Shared logic that should be reused instead of duplicated.
* Areas that are too risky to refactor right now.

Prioritize changes that provide the highest maintainability benefit with the lowest regression risk.

## Refactoring principles

Use the architecture already established in the repository when it is reasonable.

Prefer clear separation such as:

Route
→ Controller / Handler
→ Service
→ Repository / Data Access
→ Database

when appropriate for this project.

Do not introduce architectural layers only for the sake of abstraction.

Keep responsibilities focused:

### Routes

Routes should primarily handle:

* URL definitions
* Middleware composition
* Mapping requests to handlers

Avoid putting large amounts of business logic directly in routes.

### Controllers / Handlers

Controllers should primarily handle:

* Reading validated request data
* Calling services
* Mapping service results to HTTP responses

Avoid embedding large business workflows or database queries directly in controllers.

### Services

Services should contain:

* Business rules
* Application workflows
* Reusable domain logic
* Coordination between repositories or external services

Services should not depend directly on HTTP request or response objects unless the existing architecture requires it.

### Repository / Data Access

Database logic should be isolated when appropriate.

Avoid scattering queries throughout unrelated modules.

Use existing ORM or database conventions consistently.

### Validation

Centralize request validation where practical.

Do not duplicate validation logic across multiple routes.

### Middleware

Use middleware for cross-cutting concerns such as:

* Authentication
* Authorization
* Logging
* Rate limiting
* Request parsing
* Error handling

Do not hide core business logic inside middleware.

Perform the refactor in small, safe steps.

For each major step:

1. Move or extract one logical responsibility.
2. Update imports and references.
3. Run relevant tests.
4. Fix issues before continuing.
5. Preserve API behavior.

Do not perform massive file moves and rewrites in one step unless necessary.

## Important constraints

Do not:

* Change endpoint URLs unnecessarily.
* Change response formats unnecessarily.
* Change database schemas unless explicitly required.
* Rename public APIs without a migration reason.
* Remove working functionality.
* Introduce new dependencies without strong justification.
* Create unnecessary abstractions.
* Duplicate code during migration.
* Leave temporary compatibility code unless documented.
* Modify unrelated frontend code.

Preserve:

* Existing endpoint behavior
* Authentication
* Authorization
* Error responses where relied upon
* Database behavior
* Existing environment variables
* Existing integrations
* Public contracts

## Oversized files

Pay particular attention to files that have become too large.

For each oversized file:

1. Identify distinct responsibilities.
2. Group related functions.
3. Extract cohesive modules.
4. Keep module boundaries clear.
5. Avoid creating many tiny files with only one trivial function unless there is a clear architectural reason.

The goal is better cohesion, not simply fewer lines per file.

## Error handling

Review error handling during the refactor.

Prefer:

* Centralized error handling
* Consistent error types
* Clear logging
* Safe client responses

Avoid:

* Repeated try/catch blocks containing identical logic
* Swallowing errors
* Returning stack traces to clients
* Logging sensitive values

Ensure:

* Environment variables are accessed consistently.
* Configuration is centralized when practical.
* Secrets are not hardcoded.
* Development and production behavior are clearly separated.

Do not change environment variable names unnecessarily.

## Tests

Preserve existing tests.

Add tests where refactoring exposes important untested behavior.

Prioritize tests around:

* Core business logic
* Authentication
* Authorization
* Database writes
* Important API routes
* Error handling

The refactor should not rely only on manual testing.

## Validation

After each meaningful phase and again at the end, run the repository's available:

* Tests
* Linter
* Formatter
* Type checker
* Build
* Static analysis

Fix issues caused by your changes.

Review the final Git diff.

Confirm:

* No unrelated behavior changed.
* No dead imports remain.
* No duplicated old implementation remains.

    outro: `Carry the task through implementation and validation. If something cannot be completed, clearly identify the exact blocker and the evidence for it.`
  },
  codex: {
    intro: `You are Codex, an autonomous coding agent working directly inside an existing software repository.

Use the available repository and terminal tools to inspect the codebase, make the requested changes, and validate the result. Treat observed code and command output as the source of truth. Keep the work scoped to the task, preserve unrelated user changes, and make reasonable in-scope decisions without unnecessary clarification.`,
    outro: `Proceed autonomously when the repository provides enough information. Do not stop after proposing a plan or showing snippets: edit the files, run proportionate checks, inspect the final diff, and report the completed result with precise file and validation details. Never claim a command passed unless you ran it and observed the result.`
  },
  claude: {
    intro: `You are Claude Code, working directly inside an existing software repository.

Use your tools to inspect the relevant code before editing. Treat the repository and tool results as authoritative. Follow established project patterns, keep changes focused, preserve unrelated work, and base every technical conclusion on evidence rather than assumption.`,
    outro: `Complete the task end to end. Implement the requested change rather than only explaining it. Re-read the affected code, verify the behavior with the strongest available checks, and finish with a concise summary of changes, files touched, exact checks run, and any genuine remaining risks. Do not report unverified work as complete.`
  }
}

const OPERATING_RULES = `## Required operating rules

1. Read the task completely and identify the requested outcome, constraints, and acceptance criteria before editing.
2. Inspect the relevant implementation, call sites, configuration, tests, and repository conventions. Do not guess when the answer can be discovered locally.
3. Distinguish confirmed facts from assumptions. Resolve important assumptions through inspection or a focused check.
4. Prefer the smallest complete change that solves the root problem. Avoid unrelated cleanup, speculative abstractions, and broad rewrites.
5. Preserve backward compatibility, security boundaries, data integrity, accessibility, and error handling unless the task explicitly changes them.
6. Preserve existing user changes. Do not overwrite or revert unrelated work.
7. Add or update tests when behavior changes. Test meaningful outcomes and failure cases, not only implementation details.
8. Run the most relevant available validation commands. Never claim a check passed unless it was actually run successfully.
9. Review the final diff for correctness, scope, dead code, debug artifacts, exposed secrets, and accidental changes.
10. If a requirement is genuinely ambiguous and materially changes the implementation, state the ambiguity and ask one focused question. Otherwise, make the safest reasonable in-scope assumption and continue.

Definition of done:

* The requested behavior is implemented in the repository, not merely described.
* The solution follows existing project patterns and handles applicable edge cases.
* Relevant validation has passed, or failures and blockers are reported exactly.
* The final response clearly separates completed work, validation evidence, and remaining risks.`

let store = {}
let mode = 'feature'
let outputFormat = 'generic'
let autoTimer = null
const api = {
  get:  url     => fetch(url).then(r=>r.json()),
  post: (url,b) => fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(r=>r.json())
}

// Per-mode form values (in-memory)
const formValues = { feature:{}, bug:{}, rework:{}, fix:{}, security:{}, backend:{}, oversized:{}, frontend:{} }
Object.keys(window.AGENT_MODES).forEach(key => { formValues[key] = {} })

// ── Init ──────────────────────────────────────────────────────────
async function init() {
  store = await api.get('/api/store')
  mode = store.lastMode || 'feature'
  outputFormat = FORMAT_PROFILES[store.outputFormat] ? store.outputFormat : 'generic'
  document.getElementById('formatSelect').value = outputFormat

  // Restore saved form values
  if (store.formValues) {
    Object.assign(formValues, store.formValues)
  }

  applyMode(mode, false)
}

// ── Mode ──────────────────────────────────────────────────────────
function applyMode(m, doSave=true) {
  mode = m
  const color = MODE_COLORS[m]
  document.documentElement.style.setProperty('--mode-color', color)
  document.getElementById('modeDot').style.background = color
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m))
  document.getElementById('formTitle').textContent = MODES[m].label

  // Update all border/focus colors of existing inputs
  renderForm()
  generate()
  if (doSave) save({ lastMode: m })
}

document.querySelectorAll('.mode-btn').forEach(btn => btn.addEventListener('click', () => applyMode(btn.dataset.mode)))
document.getElementById('formatSelect').addEventListener('change', event => {
  outputFormat = event.target.value
  save({ outputFormat })
  generate()
})

// ── Form rendering ─────────────────────────────────────────────────
function renderForm() {
  const container = document.getElementById('formScroll')
  const cfg = MODES[mode]
  const saved = formValues[mode]

  container.innerHTML = ''

  cfg.fields.forEach(f => {
    const wrapper = document.createElement('div')
    wrapper.className = `field${f.required ? ' required-field' : ''}`

    const label = document.createElement('label')
    label.className = 'field-label'
    label.htmlFor = `f_${f.id}`
    label.innerHTML = `${f.label}${f.optional ? ' <span class="opt">(optional)</span>' : ' <span class="req">·</span>'}`
    if (f.required) label.innerHTML = `${f.label} <span class="required-badge">REQUIRED</span>`
    wrapper.appendChild(label)

    if (f.type === 'list') {
      const ta = document.createElement('textarea')
      ta.className = 'field-textarea list-field'
      ta.id = `f_${f.id}`
      ta.placeholder = f.placeholder
      ta.value = saved[f.id] || ''
      ta.rows = 4
      ta.addEventListener('input', () => { saveField(f.id, ta.value); scheduleGen() })
      const hint = document.createElement('div')
      hint.className = 'field-hint'
      hint.textContent = 'One item per line — each becomes a bullet point'
      wrapper.appendChild(ta)
      wrapper.appendChild(hint)
    } else {
      const ta = document.createElement('textarea')
      ta.className = 'field-textarea'
      ta.id = `f_${f.id}`
      ta.placeholder = f.placeholder
      ta.value = saved[f.id] || ''
      ta.rows = f.rows || 3
      ta.required = Boolean(f.required)
      if (f.required) ta.setAttribute('aria-required', 'true')
      ta.addEventListener('input', () => { saveField(f.id, ta.value); scheduleGen() })
      wrapper.appendChild(ta)
    }

    container.appendChild(wrapper)
  })

  // Progress indicator
  const prog = document.createElement('div')
  prog.className = 'progress-bar'
  prog.innerHTML = '<div class="progress-fill" id="progressFill" style="width:0%"></div>'
  container.appendChild(prog)

  updateProgress()
}

function saveField(id, value) {
  formValues[mode][id] = value
  // Debounced store save
  clearTimeout(saveField._timer)
  saveField._timer = setTimeout(() => save({ formValues }), 1000)
}

function updateProgress() {
  const cfg = MODES[mode]
  const required = cfg.fields.filter(f => !f.optional)
  const filled = required.filter(f => (formValues[mode][f.id] || '').trim())
  const pct = required.length ? Math.round(filled.length / required.length * 100) : 0
  const fill = document.getElementById('progressFill')
  if (fill) fill.style.width = pct + '%'
}

// ── Generate ──────────────────────────────────────────────────────
function scheduleGen() {
  updateProgress()
  clearTimeout(autoTimer)
  autoTimer = setTimeout(generate, 300)
}

function generate() {
  const cfg = MODES[mode]
  const profile = FORMAT_PROFILES[outputFormat]
  const vals = formValues[mode]
  const copyBtn = document.getElementById('copyBtn')
  const missingRequired = cfg.fields.filter(f => !f.optional && !(vals[f.id] || '').trim())

  copyBtn.disabled = Boolean(cfg.requireComplete && missingRequired.length)

  const parts = []
  parts.push(cfg.title)
  if (!cfg.standalone) {
    parts.push('')
    parts.push(profile.intro)
  }

  cfg.fields.forEach(f => {
    const val = (vals[f.id] || '').trim()
    if (!val && !f.required) return

    parts.push('')
    parts.push(`## ${f.label}${f.optional ? ' (optional)' : ''}`)

    if (!val && f.required) {
      parts.push(`[REQUIRED: ENTER ${f.label.toUpperCase()}]`)
    } else if (f.type === 'list') {
      const items = val.split('\n').map(l => l.trim()).filter(Boolean)
      items.forEach(item => parts.push(`* ${item}`))
    } else {
      parts.push(val)
    }
  })

  if (!cfg.standalone) {
    parts.push('')
    parts.push('---')
    parts.push('')
    parts.push(OPERATING_RULES)
  }
  parts.push('')
  parts.push(INSTRUCTIONS[mode])
  if (!cfg.standalone && profile.outro) {
    parts.push('')
    parts.push('## Agent-specific guidance')
    parts.push('')
    parts.push(profile.outro)
  }

  const text = parts.join('\n')
  document.getElementById('charCount').textContent = `${(text.length/1000).toFixed(1)}k chars`
  setOutput(highlight(text))
  const missingLabels = missingRequired.map(field => field.label).join(', ')
  document.getElementById('statusText').textContent = copyBtn.disabled ? `${missingLabels} required before copying` : 'Ready to copy'
}

// ── Syntax highlight ──────────────────────────────────────────────
function highlight(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^(# .+)$/gm, '<span class="md-h1">$1</span>')
    .replace(/^(## .+)$/gm, '<span class="md-h2">$1</span>')
    .replace(/^(### .+)$/gm, '<span class="md-h3">$1</span>')
    .replace(/^(---+)$/gm, '<span class="md-rule">$1</span>')
    .replace(/(\[.+?\])/g, '<span class="md-bracket">$1</span>')
    .replace(/^(\* .+)$/gm, '<span style="color:var(--text-sub)">$1</span>')
    .replace(/^(\d+\. .+)$/gm, '<span style="color:var(--text-sub)">$1</span>')
}

function setOutput(html) {
  const out = document.getElementById('promptOutput')
  out.className = 'prompt-output'
  out.innerHTML = html
}

// ── Copy ──────────────────────────────────────────────────────────
document.getElementById('copyBtn').addEventListener('click', () => {
  if (document.getElementById('copyBtn').disabled) return
  const text = document.getElementById('promptOutput').innerText.trim()
  if (!text) return
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn')
    btn.textContent = '✓ Copied!'
    btn.classList.add('copied')
    setTimeout(() => { btn.textContent = '📋 Copy'; btn.classList.remove('copied') }, 1800)
  })
})

// ── Clear ─────────────────────────────────────────────────────────
document.getElementById('clearBtn').addEventListener('click', () => {
  formValues[mode] = {}
  renderForm()
  generate()
  document.getElementById('statusText').textContent = 'Cleared'
  save({ formValues })
})

// ── Chips ─────────────────────────────────────────────────────────
// ── Aliases ───────────────────────────────────────────────────────
// ── Alias modal ───────────────────────────────────────────────────
// ── Watched folder ────────────────────────────────────────────────
// ── Persist ───────────────────────────────────────────────────────
async function save(partial) {
  store = { ...store, ...partial }
  await api.post('/api/store', store)
}

// ── Helpers ───────────────────────────────────────────────────────
init()
</script>
</body>
</html>
